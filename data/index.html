<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telemetria do Sistema</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Painel de Controlo</h1>
  
  <div class="grid-container">
    <div class="coluna borda-rede">
      <h2>Rede</h2>
      <div class="table-container">
        <table id="tabela_rede">
          <thead>
            <tr>
              <th>Tensão (V)</th>
              <th>Corrente (mA)</th>
              <th>Potência (mW)</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>

    <div class="coluna borda-cidade">
      <h2>Cidade</h2>
      <div class="table-container">
        <table id="tabela_cidade">
          <thead>
            <tr>
              <th>Tensão (V)</th>
              <th>Corrente (mA)</th>
              <th>Potência (mW)</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>

    <div class="coluna borda-bateria">
      <h2>Bateria Gravítica</h2>
      <div class="table-container">
        <table id="tabela_bateria">
          <thead>
            <tr>
              <th>Tensão (V)</th>
              <th>Corrente (mA)</th>
              <th>Potência (mW)</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="status-container">
    <span style="font-size: 0.8em; color: #888; text-transform: uppercase;">Estado do Sistema</span>
    <div id="estado_txt">A CARREGAR</div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
